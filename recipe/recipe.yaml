context:
  name: roboplan
  version: "0.3.0"

recipe:
  name: roboplan
  version: ${{ version }}

source:
  url: https://github.com/open-planning/roboplan/archive/refs/tags/${{ version }}.tar.gz
  sha256: 957f7bff8b81f9fedb851cc5b4528dd4b8291a538345906ec9ceb0944a1c3ca1

build:
  number: 0

outputs:
  - package:
      name: libroboplan-example-models
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan_example_models" \
          -B build/roboplan_example_models \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DBUILD_TESTING=OFF \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan_example_models
        cmake --install build/roboplan_example_models
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan-example-models", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - gtest
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan_example_models

  - package:
      name: libroboplan
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan" \
          -B build/roboplan \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DBUILD_TESTING=OFF \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan
        cmake --install build/roboplan
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - gtest
        - libcoal
        - libpinocchio ==3.9.0
        - yaml-cpp
        - libroboplan-example-models
        - eigen-abi-devel
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan

  - package:
      name: libroboplan-oink
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan_oink" \
          -B build/roboplan_oink \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DBUILD_TESTING=OFF \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan_oink
        cmake --install build/roboplan_oink
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan-oink", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - gtest
        - libroboplan
        - libroboplan-example-models
        - osqp-eigen
        - eigen-abi-devel
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan_oink

  - package:
      name: libroboplan-rrt
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan_rrt" \
          -B build/roboplan_rrt \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DBUILD_TESTING=OFF \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan_rrt
        cmake --install build/roboplan_rrt
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan-rrt", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - gtest
        - libroboplan
        - libroboplan-example-models
        - eigen-abi-devel
    tests:
      - package_contents:
          lib:
            - roboplan_rrt

  - package:
      name: libroboplan-simple-ik
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan_simple_ik" \
          -B build/roboplan_simple_ik \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DBUILD_TESTING=OFF \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan_simple_ik
        cmake --install build/roboplan_simple_ik
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan-simple-ik", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - gtest
        - libroboplan
        - libroboplan-example-models
        - eigen-abi-devel
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan_simple_ik

  - package:
      name: libroboplan-toppra
      version: ${{ version }}
    build:
      skip:
        - win
      script: |
        cmake -S "${SRC_DIR}/roboplan_toppra" \
          -B build/roboplan_toppra \
          -G Ninja \
          ${CMAKE_ARGS} \
          -DBUILD_TESTING=OFF \
          -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS} -D_LIBCPP_DISABLE_AVAILABILITY"
        cmake --build build/roboplan_toppra
        cmake --install build/roboplan_toppra
    requirements:
      run_exports:
        - ${{ pin_subpackage("libroboplan-toppra", upper_bound="x.x.x") }}
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - gtest
        - libroboplan
        - libroboplan-example-models
        - libtoppra
        - eigen-abi-devel
      ignore_run_exports:
        by_name:
          - gtest
        from_package:
          - gtest
    tests:
      - package_contents:
          lib:
            - roboplan_toppra

  - package:
      name: roboplan-python
      version: ${{ version }}
    build:
      skip:
        - win
      script: build_roboplan_bindings.sh
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - python >=${{ python_min }}
        - pip
        - nanobind
        - scikit-build-core
        - if: build_platform != target_platform
          then: cross-python_${{ target_platform }}
      host:
        - python >=${{ python_min }}
        - pip
        - nanobind
        - scikit-build-core
        - libroboplan
        - libroboplan-example-models
        - libroboplan-oink
        - libroboplan-rrt
        - libroboplan-simple-ik
        - libroboplan-toppra
        - libtoppra
        - eigen-abi-devel
      run:
        - python >=${{ python_min }}
        - numpy
        - pinocchio-python ==3.9.0
        - libroboplan
        - libroboplan-example-models
        - libroboplan-oink
        - libroboplan-rrt
        - libroboplan-simple-ik
        - libroboplan-toppra
        - libtoppra
    tests:
      - python:
          imports:
            - roboplan

about:
  homepage: https://github.com/open-planning/roboplan
  license: MIT
  license_file: LICENSE
  summary: Modern robot motion planning library based on Pinocchio.
  repository: https://github.com/open-planning/roboplan
  documentation: https://roboplan.readthedocs.io/en/latest/

extra:
  feedstock-name: roboplan
  recipe-maintainers:
    - sea-bass
    - eholum
